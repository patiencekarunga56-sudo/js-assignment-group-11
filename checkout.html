<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PearlShop - Checkout</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav>
    <h1>PearlShop</h1>
    <div>
      <a href="index.html">Home</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      <a href="checkout.html">Checkout</a>
    </div>
  </nav>
  <div class="page-title">
    <h2>Checkout</h2>
  </div>

  <div class="checkout-wrapper">

    <div class="order-box">
      <h3>Your Order</h3>
      <div id="order-list"></div>
      <hr />
      <p>Total: <strong id="order-total">UGX 0</strong></p>
    </div> 
    <div class="form-box">
      <h3>Delivery Details</h3>
      <p id="error-msg" style="display:none; color:red;"></p>
      <p id="success-msg" style="display:none; color:green;"></p>

      <label>Full Name</label>
      <input type="text" id="name" placeholder="e.g.kirabo tiana" />

      <label>Email</label>
      <input type="email" id="email" placeholder="e.g. kristiana@email.com" />

      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="e.g. 0768031960" />

      <label>Delivery Address</label>
      <input type="text" id="address" placeholder="e.g. Plot 45, Kampala Road" />

      <button id="place-order-btn">Place Order</button>
    </div>

  </div>

  <footer>
 <p>PearlShop &copy; 2026 group 11</p>
  </footer>
  <script src="js/script.js"></script>

</body>
</html>
